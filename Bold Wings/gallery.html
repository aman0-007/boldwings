<!DOCTYPE html>

  <title>Gallery Section</title>
  <!-- Link to Tailwind CSS CDN for styling -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 4px solid #ecc544; /* Add border color */
      border-radius: 0.5rem; /* Optional: to match rounded corners of images */
      padding: 0.5rem; /* Increase padding around images */
      opacity: 0; /* Start as invisible */
      animation: fadeIn 1s forwards; /* Apply fade-in animation */
    }

    .gallery-item:nth-child(1) {
      animation-delay: 0.2s;
    }
    .gallery-item:nth-child(2) {
      animation-delay: 0.4s;
    }
    .gallery-item:nth-child(3) {
      animation-delay: 0.6s;
    }
    .gallery-item:nth-child(4) {
      animation-delay: 0.8s;
    }
    .gallery-item:nth-child(5) {
      animation-delay: 1s;
    }
    .gallery-item:nth-child(6) {
      animation-delay: 1.2s;
    }

    .gallery-item:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
